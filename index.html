<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Models Showcase - Helicopter & Pizza Car</title>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@r128/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@r128/examples/jsm/"
      }
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideDown 0.8s ease-out;
        }

        .tab-button {
            background: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-weight: 600;
            color: #667eea;
        }

        .tab-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .model-section, .reference-section {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.8s ease-out;
        }

        .section-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.5em;
            font-weight: 600;
        }

        .model-viewer {
            width: 100%;
            height: 500px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: auto;
        }

        #canvas3d {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .model-image {
            max-width: 90%;
            max-height: 450px;
            object-fit: contain;
            border-radius: 10px;
        }

        .reference-section {
            display: flex;
            flex-direction: column;
        }

        .references-container {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .reference-image {
            margin-bottom: 20px;
            text-align: center;
        }

        .reference-image img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .reference-image img:hover {
            transform: scale(1.05);
        }

        .reference-label {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
        }

        .carousel-nav {
            text-align: center;
            padding: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        .carousel-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .carousel-button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .carousel-button.active {
            background: #764ba2;
            font-weight: bold;
        }

        .controls-info {
            text-align: center;
            padding: 15px;
            background: #f0f4ff;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            color: #666;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .model-viewer {
                height: 400px;
            }
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 3D Models Showcase</h1>
            <p class="subtitle">University Projects</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="openTab('helicopter')">🚁 Helicopter</button>
            <button class="tab-button" onclick="openTab('pizzacar')">🍕 Pizza Car</button>
        </div>

        <!-- HELICOPTER TAB -->
        <div id="helicopter" class="tab-content active">
            <div class="content">
                <div class="model-section">
                    <div class="section-header">3D Model</div>
                    <div class="model-viewer" id="helicopterViewer">
                        <img class="model-image" src="ISO.png" alt="Helicopter ISO View">
                    </div>
                    <div class="carousel-nav">
                        <button class="carousel-button active" onclick="switchHelicopterView('ISO.png')">ISO</button>
                        <button class="carousel-button" onclick="switchHelicopterView('Front.png')">Front</button>
                        <button class="carousel-button" onclick="switchHelicopterView('Side_01.png')">Side</button>
                        <button class="carousel-button" onclick="switchHelicopterView('Top.png')">Top</button>
                    </div>
                </div>

                <div class="reference-section">
                    <div class="section-header">Step-by-Step Process</div>
                    <div class="references-container" id="helicopterSteps">
                        <div class="reference-image">
                            <img src="a.png" alt="Step A">
                            <div class="reference-label">Step A</div>
                        </div>
                        <div class="reference-image">
                            <img src="b.png" alt="Step B">
                            <div class="reference-label">Step B</div>
                        </div>
                        <div class="reference-image">
                            <img src="c.png" alt="Step C">
                            <div class="reference-label">Step C</div>
                        </div>
                        <div class="reference-image">
                            <img src="d1.png" alt="Step D1">
                            <div class="reference-label">Step D1</div>
                        </div>
                        <div class="reference-image">
                            <img src="d2.png" alt="Step D2">
                            <div class="reference-label">Step D2</div>
                        </div>
                        <div class="reference-image">
                            <img src="f.png" alt="Step F">
                            <div class="reference-label">Step F</div>
                        </div>
                        <div class="reference-image">
                            <img src="g.png" alt="Step G">
                            <div class="reference-label">Step G</div>
                        </div>
                        <div class="reference-image">
                            <img src="h.png" alt="Step H">
                            <div class="reference-label">Step H</div>
                        </div>
                        <div class="reference-image">
                            <img src="i.png" alt="Step I">
                            <div class="reference-label">Step I</div>
                        </div>
                        <div class="reference-image">
                            <img src="j.png" alt="Step J">
                            <div class="reference-label">Step J</div>
                        </div>
                        <div class="reference-image">
                            <img src="k.png" alt="Step K">
                            <div class="reference-label">Step K</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PIZZA CAR TAB -->
        <div id="pizzacar" class="tab-content">
            <div class="content" style="grid-template-columns: 1fr;">
                <div class="model-section">
                    <div class="section-header">🍕 Pizza Car - 3D Model (Interactive)</div>
                    <div class="model-viewer" id="pizzacarViewer">
                        <canvas id="canvas3d"></canvas>
                    </div>
                    <div class="controls-info">
                        🖱️ Drag to rotate • Scroll to zoom • Right-click to pan
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>3D Models Showcase | University Projects</p>
        </footer>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let pizzaCarMesh = null;

        function initThreeJS() {
            const container = document.getElementById('pizzacarViewer');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5f5);

            // Camera
            camera = new THREE.PerspectiveCamera(
                75,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 5, 10);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.innerHTML = '';
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            // Create simple pizza car geometry
            createPizzaCar();

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2;
            controls.enableZoom = true;
            controls.enablePan = true;

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function createPizzaCar() {
            const group = new THREE.Group();

            // Main body (red box)
            const bodyGeometry = new THREE.BoxGeometry(3, 2, 6);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1;
            group.add(body);

            // Pizza roof (circular)
            const roofGeometry = new THREE.ConeGeometry(1.8, 0.5, 32);
            const roofMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            const roof = new THREE.Mesh(roofGeometry, roofMaterial);
            roof.position.y = 2.5;
            roof.rotation.z = Math.PI / 4;
            group.add(roof);

            // Wheels (4 cylinders)
            const wheelGeometry = new THREE.CylinderGeometry(0.6, 0.6, 0.4, 32);
            const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });

            const wheelPositions = [
                [-1.2, 0.6, 1.5],
                [1.2, 0.6, 1.5],
                [-1.2, 0.6, -1.5],
                [1.2, 0.6, -1.5]
            ];

            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                group.add(wheel);
            });

            // Cabin/windshield
            const cabinGeometry = new THREE.BoxGeometry(2.5, 1.2, 1.5);
            const cabinMaterial = new THREE.MeshStandardMaterial({ color: 0xffffcc, transparent: true, opacity: 0.7 });
            const cabin = new THREE.Mesh(cabinGeometry, cabinMaterial);
            cabin.position.set(0, 1.8, -2);
            group.add(cabin);

            // Door handle (small cylinder)
            const handleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.3, 16);
            const handleMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            const handle = new THREE.Mesh(handleGeometry, handleMaterial);
            handle.rotation.z = Math.PI / 2;
            handle.position.set(1.5, 1.5, -2);
            group.add(handle);

            scene.add(group);
            pizzaCarMesh = group;
        }

        function openTab(tabName) {
            // Hide all tabs
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to clicked button
            event.target.classList.add('active');

            // Initialize Three.js when Pizza Car tab is clicked
            if (tabName === 'pizzacar' && !renderer) {
                setTimeout(() => {
                    initThreeJS();
                }, 100);
            }
        }

        function switchHelicopterView(imageName) {
            const viewer = document.getElementById('helicopterViewer');
            const img = viewer.querySelector('.model-image');
            
            img.src = imageName;
            
            // Update active button
            const buttons = document.querySelectorAll('.carousel-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Make functions global
        window.openTab = openTab;
        window.switchHelicopterView = switchHelicopterView;
    </script>
</body>
</html>
