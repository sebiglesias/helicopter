<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 60px;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            font-weight: 400;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 40px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tab-btn:hover {
            color: #1a1a1a;
        }

        .tab-btn.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .model-section {
            background: #f9f9f9;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
        }

        .model-viewer {
            width: 100%;
            height: 500px;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .model-viewer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 20px;
        }

        .view-controls {
            display: flex;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid #e5e5e5;
            flex-wrap: wrap;
            background: #fafafa;
        }

        .view-btn {
            padding: 8px 16px;
            border: 1px solid #d5d5d5;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .view-btn:hover {
            background: #f0f0f0;
            border-color: #999;
        }

        .view-btn.active {
            background: #1a1a1a;
            color: white;
            border-color: #1a1a1a;
        }

        .references {
            display: flex;
            flex-direction: column;
        }

        .ref-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ref-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            overflow-y: auto;
            max-height: 520px;
            padding-right: 8px;
        }

        .ref-item {
            aspect-ratio: 1;
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ref-item:hover {
            border-color: #1a1a1a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .ref-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pizza-car-note {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .pizza-car-note p {
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .file-info {
            font-size: 0.85rem;
            color: #999;
            background: #f9f9f9;
            padding: 12px 16px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            margin-top: 8px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }

            .model-viewer {
                height: 400px;
            }

            .ref-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 12px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .tabs {
                flex-wrap: wrap;
                gap: 8px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .ref-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>3D Model Portfolio</h1>
            <p class="subtitle">University Projects • 3ds Max & SketchUp</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'helicopter')">Helicopter</button>
            <button class="tab-btn" onclick="switchTab(event, 'pizzacar')">Pizza Car</button>
        </div>

        <!-- HELICOPTER TAB -->
        <div id="helicopter" class="tab-content active">
            <div class="grid">
                <div class="model-section">
                    <div class="model-viewer" id="helicopterViewer">
                        <img id="helicopterImage" src="ISO.png" alt="Helicopter ISO view">
                    </div>
                    <div class="view-controls">
                        <button class="view-btn active" onclick="switchView(event, 'helicopterImage', 'ISO.png')">ISO</button>
                        <button class="view-btn" onclick="switchView(event, 'helicopterImage', 'Front.png')">Front</button>
                        <button class="view-btn" onclick="switchView(event, 'helicopterImage', 'Side_01.png')">Side</button>
                        <button class="view-btn" onclick="switchView(event, 'helicopterImage', 'Top.png')">Top</button>
                    </div>
                </div>

                <div class="references">
                    <div class="ref-title">Building Steps</div>
                    <div class="ref-grid">
                        <div class="ref-item"><img src="a.png" alt="Step A" title="Step A"></div>
                        <div class="ref-item"><img src="b.png" alt="Step B" title="Step B"></div>
                        <div class="ref-item"><img src="c.png" alt="Step C" title="Step C"></div>
                        <div class="ref-item"><img src="d1.png" alt="Step D1" title="Step D1"></div>
                        <div class="ref-item"><img src="d2.png" alt="Step D2" title="Step D2"></div>
                        <div class="ref-item"><img src="f.png" alt="Step F" title="Step F"></div>
                        <div class="ref-item"><img src="g.png" alt="Step G" title="Step G"></div>
                        <div class="ref-item"><img src="h.png" alt="Step H" title="Step H"></div>
                        <div class="ref-item"><img src="i.png" alt="Step I" title="Step I"></div>
                        <div class="ref-item"><img src="j.png" alt="Step J" title="Step J"></div>
                        <div class="ref-item"><img src="k.png" alt="Step K" title="Step K"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PIZZA CAR TAB -->
        <div id="pizzacar" class="tab-content">
            <div class="grid">
                <div class="model-section">
                    <div class="model-viewer" id="pizzacarViewer">
                        <img id="pizzacarImage" src="PizzaCar.skp" alt="Pizza Car model" style="display: none;">
                    </div>
                    <div class="pizza-car-note">
                        <p><strong>SketchUp Model</strong></p>
                        <p>Pizza Car created in SketchUp</p>
                        <div class="file-info">PizzaCar.skp • 472 KB</div>
                    </div>
                </div>

                <div class="references">
                    <div class="ref-title">Project Files</div>
                    <div style="padding-top: 8px;">
                        <div style="padding: 16px; background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 4px; margin-bottom: 12px;">
                            <div style="font-weight: 500; margin-bottom: 8px;">PizzaCar.skp</div>
                            <div style="font-size: 0.85rem; color: #666;">SketchUp model file</div>
                            <div class="file-info" style="margin-top: 8px;">472 KB</div>
                        </div>
                        <div style="padding: 16px; background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 4px;">
                            <div style="font-weight: 500; margin-bottom: 8px;">PizzaCar.skb</div>
                            <div style="font-size: 0.85rem; color: #666;">SketchUp backup file</div>
                            <div class="file-info" style="margin-top: 8px;">468 KB</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(e, tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            e.target.classList.add('active');
        }

        function switchView(e, imageId, src) {
            document.getElementById(imageId).src = src;
            
            // Update button states
            e.target.parentElement.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            e.target.classList.add('active');
        }
    </script>
</body>
</html>
